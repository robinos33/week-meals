name: Déploiement front (Cloudflare Pages)

# Construit et déploie le front PWA sur Cloudflare Pages.
# Secrets requis (Settings → Secrets and variables → Actions) :
#   - CLOUDFLARE_API_TOKEN   (permission « Cloudflare Pages: Edit »)
#   - CLOUDFLARE_ACCOUNT_ID
# Variable requise :
#   - VITE_API_URL           (URL de l'API par environnement)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy dist --project-name=week-meals --branch=${{ github.ref_name }}
