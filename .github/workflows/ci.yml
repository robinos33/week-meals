name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      # Unitaires et intégration dans le même run : depuis l'ADR-0008 les tests
      # d'intégration ouvrent chacun une base SQLite temporaire, il n'y a plus
      # de service à provisionner ni de `--ignored` à passer.
      - name: Tests
        run: cargo test --workspace
