name: CI front

# Pendant du workflow `ci.yml` (API) : le front doit tenir le même niveau
# d'exigence que le backend (cf. ADR-0001). Sans ça, le seul typecheck du front
# se produirait au déploiement — trop tard.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"

jobs:
  check:
    name: typecheck · lint · tests · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Tests
        run: npm test
      - name: Build
        run: npm run build
